<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brief — Independent Research Dossiers</title>
<style>
  :root { --bg:#0f1117; --surface:#1a1d27; --border:#2d3250; --text:#e2e8f0; --muted:#8892a4; --accent:#6c8cff; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 20px; }
  h1 { font-size:2rem; font-weight:800; color:var(--accent); margin-bottom:8px; }
  p { color:var(--muted); font-size:1rem; margin-bottom:32px; }
  .empty { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:32px 40px; text-align:center; max-width:420px; }
  .label { font-size:.75rem; color:var(--muted); text-transform:uppercase; letter-spacing:.1em; margin-bottom:16px; }
</style>
</head>
<body>
<div class="empty">
  <div class="label">Independent Research</div>
  <h1>Brief</h1>
  <p>Structured public-interest dossiers.<br>Separating facts, claims, and open questions.</p>
  <p style="font-size:.8rem;color:#4b5563">First brief coming soon.</p>
</div>
</body>
</html>
